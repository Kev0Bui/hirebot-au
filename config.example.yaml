# =============================================================================
# Hirebot — Configuration
# =============================================================================
# This is the template. Do NOT edit this file directly.
# Run /setup to create your personal config.yaml (which is gitignored).
# =============================================================================

# ---------------------------------------------------------------------------
# Core config (required)
# ---------------------------------------------------------------------------

# Your full name as it appears on your CV and cover letters.
candidate_name: "Your Name"

# Target role titles you're looking for. Be specific — these are used to
# score job postings against your profile.
target_roles:
  - "Content Designer"
  - "UX Writer"
  - "Business Analyst"

# Keywords that MUST appear in relevant job listings.
# These boost a job's fit score when found in the title or description.
keywords_include:
  - "content design"
  - "UX writing"
  - "design systems"
  - "user experience"
  - "agile"

# Keywords that signal irrelevant roles. Jobs matching these are filtered out.
keywords_exclude:
  - "senior manager"
  - "director"
  - "unpaid"
  - "internship"
  - "visa sponsorship required"

# Types of employment you're open to.
work_types:
  - "full_time"
  - "contract"
  # - "part_time"

# CV template style. Controls the visual layout of generated .docx CVs.
# Options: professional, creative, minimal
cv_template_style: "professional"

# ---------------------------------------------------------------------------
# Australian job search config (optional — only used by /scrape)
# ---------------------------------------------------------------------------
# The /scrape command searches the Adzuna AU API. If you're not in Australia,
# you can ignore this section entirely and use /apply directly with job URLs.
#
# To use /scrape, you'll need free Adzuna API credentials:
#   1. Sign up at https://developer.adzuna.com
#   2. Add your credentials to a .env file in the repo root:
#
#        ADZUNA_APP_ID=your-app-id
#        ADZUNA_APP_KEY=your-app-key
#
#   The .env file is gitignored, so your keys stay private.

# Australian cities or regions to search. Use "Remote" for fully remote roles.
locations:
  - "Brisbane"
  - "Sydney"
  - "Remote"

# Salary expectations in AUD (annual, before tax).
# Used to filter Adzuna results. Set to 0 to disable filtering.
salary_min_aud: 80000
salary_max_aud: 140000
