# =============================================================================
# Hirebot AU — Configuration
# =============================================================================
# Edit this file before running /setup. Every field has a sensible default,
# but you should personalise it to your situation.
# =============================================================================

# Your full name as it appears on your CV and cover letters.
candidate_name: "Your Name"

# Target role titles you're looking for. Be specific — these are used to
# query job boards and to score results against your profile.
target_roles:
  - "Content Designer"
  - "UX Writer"
  - "Business Analyst"

# Australian cities or regions you'd consider working in.
# Use "Remote" for fully remote roles.
locations:
  - "Brisbane"
  - "Sydney"
  - "Remote"

# Salary expectations in AUD (annual, before tax).
# Used to filter Adzuna results. Set to 0 to disable filtering.
salary_min_aud: 80000
salary_max_aud: 140000

# Types of employment you're open to.
work_types:
  - "full_time"
  - "contract"
  # - "part_time"

# Keywords that MUST appear in relevant job listings.
# These boost a job's fit score when found in the title or description.
keywords_include:
  - "content design"
  - "UX writing"
  - "design systems"
  - "user experience"
  - "agile"

# Keywords that signal irrelevant roles. Jobs matching these are filtered out.
keywords_exclude:
  - "senior manager"
  - "director"
  - "unpaid"
  - "internship"
  - "visa sponsorship required"

# Adzuna API credentials.
# Do NOT put your credentials here — they'll be committed to git.
# Instead, add them to a .env file in the repo root:
#
#   ADZUNA_APP_ID=your-app-id
#   ADZUNA_APP_KEY=your-app-key
#
# Sign up free at https://developer.adzuna.com to get your credentials.
# The .env file is gitignored, so your keys stay private.

# Output format for CVs and cover letters. Currently only "docx" is supported.
output_format: "docx"

# CV template style. Controls the visual layout of generated .docx CVs.
# Options: professional, creative, minimal
cv_template_style: "professional"
